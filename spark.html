<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark</title>

<style>
/* Reset & basic body */
* { box-sizing: border-box; margin:0; padding:0; font-family:"Segoe UI", sans-serif;}
body { height:100vh; background:#050505; color:white; display:flex; align-items:center; justify-content:center; overflow:hidden; }

/* Glass container */
.glass-container {
  padding:40px 60px;
  border-radius:24px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(30px);
  text-align:center;
}

/* Sacred Button */
.jesus-btn {
  position: relative;
  padding: 16px 28px;
  font-size: 1.1rem;
  letter-spacing: 0.08em;
  border-radius: 28px;
  border: 1px solid rgba(175,202,210,0.25);
  color: #EAF6FF;
  cursor: pointer;
  backdrop-filter: blur(18px);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.35), transparent 40%),
    radial-gradient(circle at 70% 70%, rgba(200,140,79,0.35), transparent 60%),
    rgba(59,80,106,0.55);
  box-shadow:
    0 0 30px rgba(200,140,79,0.25),
    inset 0 0 20px rgba(255,255,255,0.15);
  transition: all 0.5s cubic-bezier(0.45,0,0.25,1);
  overflow: hidden;
}

/* Light shimmer sweep */
.jesus-btn::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(
    120deg,
    transparent 20%,
    rgba(255,255,255,0.4) 45%,
    transparent 70%
  );
  transform: translateX(-120%);
  transition: transform 1.2s ease;
}

.jesus-btn:hover::before {
  transform: translateX(120%);
}

/* Hover Presence */
.jesus-btn:hover {
  box-shadow:
    0 0 50px rgba(200,140,79,0.5),
    0 0 80px rgba(175,202,210,0.25),
    inset 0 0 30px rgba(255,255,255,0.25);
  transform: translateY(-2px) scale(1.02);
}

/* Active press */
.jesus-btn:active {
  transform: scale(0.98);
}

/* Logo flame */
.flame-s {
  font-size:100px;
  font-weight:900;
  background: linear-gradient(180deg, #fff5cc, #ffae00, #ff3d00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 10px rgba(255,180,0,0.8,0 0 30px rgba(255,80,0,0.6);
  animation:flicker 3s infinite ease-in-out;
}

/* Button */
.ignite-button { padding:12px 36px; border-radius:30px; border:none; cursor:pointer; background:linear-gradient(90deg,#fff5cc,#ffae00,#ff3d00); font-weight:bold; transition:all 0.4s ease;}
.ignite-button:hover { transform:scale(1.05); }

/* Ignite overlay */
.ignite-overlay { position:fixed; top:50%; left:50%; width:0; height:0; border-radius:50%; background:radial-gradient(circle, rgba(255,220,100,0.4) 0%, rgba(255,120,0,0) 70%); transform:translate(-50%,-50%) scale(0); opacity:0; transition:0.6s ease; z-index:50;}
body.ignited .ignite-overlay { transform:translate(-50%,-50%) scale(12); opacity:1; }

/* Sparks container */
.sparks-container { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; overflow:visible; z-index:40; }
.spark { position:absolute; width:6px; height:6px; border-radius:50%; background:orange; animation:spark-float 1s forwards; }

@keyframes flicker { 0%,100%{opacity:1;} 50%{opacity:0.85;} }
@keyframes spark-float { 0%{opacity:1; transform:translateY(0);} 100%{opacity:0; transform:translateY(-120px);} }
</style>
<body>

  <!-- Background glow -->
  <div class="background-glow"></div>

  <!-- Main glass container -->
  <main class="glass-container">
    <div class="logo-wrapper">
      <p class="text-s text-slate-500 mt- text-center">Do you know the Father and the Son?<br> I want to make sure you KNOW Them!<br><button class="jesus-btn" onclick="openCard('frontporch')">✝️ Who is
        Jesus?</button>
      </p>
      <div class="flame-s">נִיצוֹץ</div>
    <p class="subtitle">Spark</p>

<!-- Hero -->
 <!-- <div class="logo">שלום
  <img src="images/HGHouses.png" class="w-7 h-7 shrink-0"</img></div>-->
  
  <p>Augmented Redemption — 1st century meets 21st century</p>
</div>

    </div>

    <h1 class="title">Awaken What Was Planted.<br> Grow What Was Sown.</h1>
    
    <button id="igniteBtn" class="ignite-button">Ignite [נִיצוֹץ]</button>


  <div id="card-container"></div> 
    <div id="cards" class="cards hidden">

      <div class="card">
        <h2>SparkStarter</h2>
        <p>Re-Discover your inner spark and ignite your potential.</p>
      <button onclick="openCard('frontporch')">
Open PrayerMap
</button></div>

  </main>

  <!-- Sparks container -->

</div>

  <script type="module" src="js/app.js"></script>

</body>
</html>
