<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<style>
/* Reset & basic body */
* { box-sizing: border-box; margin:0; padding:0; font-family:"Segoe UI", sans-serif;}
body { height:100vh; background:#050505; color:white; display:flex; align-items:center; justify-content:center; overflow:hidden; }

/* Glass container */
.glass-container {
  padding:40px 60px;
  border-radius:24px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(30px);
  text-align:center;
}

/* Logo flame */
.flame-s {
  font-size:100px;
  font-weight:900;
  background: linear-gradient(180deg, #fff5cc, #ffae00, #ff3d00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 10px rgba(255,180,0,0.8,0 0 30px rgba(255,80,0,0.6);
  animation:flicker 3s infinite ease-in-out;
}

/* Button */
.ignite-button { padding:12px 36px; border-radius:30px; border:none; cursor:pointer; background:linear-gradient(90deg,#fff5cc,#ffae00,#ff3d00); font-weight:bold; transition:all 0.4s ease;}
.ignite-button:hover { transform:scale(1.05); }

/* Ignite overlay */
.ignite-overlay { position:fixed; top:50%; left:50%; width:0; height:0; border-radius:50%; background:radial-gradient(circle, rgba(255,220,100,0.4) 0%, rgba(255,120,0,0) 70%); transform:translate(-50%,-50%) scale(0); opacity:0; transition:0.6s ease; z-index:50;}
body.ignited .ignite-overlay { transform:translate(-50%,-50%) scale(12); opacity:1; }

/* Sparks container */
.sparks-container { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; overflow:visible; z-index:40; }
.spark { position:absolute; width:6px; height:6px; border-radius:50%; background:orange; animation:spark-float 1s forwards; }

@keyframes flicker { 0%,100%{opacity:1;} 50%{opacity:0.85;} }
@keyframes spark-float { 0%{opacity:1; transform:translateY(0);} 100%{opacity:0; transform:translateY(-120px);} }

#viewport {

flex:1;

overflow:auto;

padding:24px;

scroll-behavior:smooth;

}

.spark-stage {

height:95vh;
width:95vw;

max-width:900px;
margin:auto;

display:flex;
flex-direction:column;

border-radius:28px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(30px);
-webkit-backdrop-filter:blur(30px);

border:1px solid rgba(255,255,255,0.15);

box-shadow:
0 30px 80px rgba(0,0,0,.6),
inset 0 0 40px rgba(255,255,255,.05);

overflow:hidden;

}
</style>
<!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- MarkerCluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- MarkerCluster JS -->
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

<body>

<div class="atmosphere"></div>

<main class="spark-stage">

    <header class="spark-header">
    </header>

    <section id="viewport"></section>

    <div id="companion"></div>

</main>



  <!-- Background glow -->
  <div class="background-glow"></div>

  <!-- Main glass container -->
  <main class="glass-container relative w-500px h-500px">
    <div class="logo-wrapper relative w-500px h-500px">

      <div class="flame-s">S</div>

    </div>
    
    <button id="igniteBtn" class="ignite-button">Ignite [נִיצוֹץ]</button>


  <div id="card-container"></div> 
    <div id="cards" class="cards hidden">

      <div class="card">
<p><!-- Card body -->
        <div class="p-5 space-y-5">
            <div class="relative bg-slate-900/90 border border-slate-700 rounded-3xl shadow-2xl">
                <div id="mapWrapper" class="relative w-500px h-500px">


                        <!-- Map Container -->
                        <div id="mapContainer" class="relative h-[280px] w-480 z-10"></div>

                        <!-- Search Bar -->
                        <div class="absolute top-4 left-1/2 -translate-x-1/2 z-50 w-[30%] max-w-md">
                            <input
                                id="mapSearch"
                                type="text"
                                placeholder="Search prayers, hellos, people, communities, or..."
                                class="w-full px-4 py-3 rounded-full bg-slate-900/80 backdrop-blur-md border border-slate-700 text-slate-200 text-sm placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-amber-500/40" />
                        </div>

                        <!-- Results Drawer -->
                        <div id="resultsDrawer" class="absolute top-0 left-0 right-0 translate-y-[-100%] transition-transform duration-300 ease-out z-40">
                            <div class="mt-20 mx-auto w-[92%] max-w-md bg-slate-900/95 backdrop-blur-md border border-slate-700 rounded-2xl shadow-2xl overflow-hidden">
                                <div id="resultsList" class="max-h-[300px] overflow-y-auto p-3 space-y-2 text-sm text-slate-200"></div>
                            </div>
                        </div>

                        <!-- Community Panel -->
                        <aside id="communityAside">
                            <div id="communityPanel" class="absolute bottom-4 right-4 w-60 max-h-[43vh] bg-slate-900/70 backdrop-blur-md border border-slate-700/60 rounded-2xl shadow-2xl flex flex-col overflow-hidden transform translate-x-full transition-transform duration-300 ease-out z-40">
                                <div id="communityList" class="flex-1 overflow-y-auto p-2 space-y-2 text-sm rounded scrollbar-track-transparent"></div>
                            </div>
                        </aside>

                        <!-- Center Glow Ring -->
                        <div class="pointer-events-none absolute inset-0 flex items-center justify-center z-20">
                            <div class="w-72 h-72 rounded-full bg-[radial-gradient(circle,rgba(255,120,0,0.25),transparent_70%)] blur-2xl opacity-60"></div>
                        </div>

                        <!-- Top Right Controls -->
                        <div class="absolute top-4 right-4 flex gap-2 z-30">
                            <button id="fullscreenMapBtn" class="px-4 py-2 rounded-xl bg-black/60 backdrop-blur-md text-white text-sm border border-slate-600 hover:bg-black/80 transition">
                                🗺️ Expand
                            </button>
                            <button id="prayerButton" class="px-4 py-2 rounded-xl bg-orange-600/90 hover:bg-orange-600 text-white text-sm font-medium transition shadow-lg">
                                ✚ Add Prayer
                            </button>
                        </div>

                        <!-- Bottom Campfire Bar -->
                        <div class="absolute bottom-0 inset-x-0 z-30 bg-gradient-to-t from-black via-black/80 to-transparent p-6 text-center">
                            <p class="text-slate-300 text-sm mb-3">
                                We gather here to lift one another up.
                            </p>
                            <div class="flex justify-center gap-4">
                                <button id="prayTogetherBtn" class="px-6 py-2 rounded-full bg-amber-600 hover:bg-amber-500 text-white font-medium transition">
                                    🙏 Pray Together
                                </button>
                                <button id="joinButton" class="px-6 py-2 rounded-full bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-600 transition">
                                    🤝 Join Community
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Porch Modal -->
        <div id="porchPanel" class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center">
            <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-[90%] max-w-md text-center shadow-2xl">
                <h2 id="porchTitle" class="text-xl font-semibold text-cyan-300 mb-2">Welcome</h2>
                <p id="porchMessage" class="text-slate-300 leading-relaxed mb-4">You're not alone here.</p>
                <button onclick="closePorch()" class="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-500 text-white">
                    Close
                </button>
            </div>
        </div>
    </div>
</section>

<script type="module">
    // Community panel interaction
    const panel = document.getElementById('communityPanel');
    const list = document.getElementById('communityList');

    function updateResults(results) {
        list.innerHTML = "";
        if (results.length === 0) {
            panel.classList.add('translate-x-full');
            return;
        }
        results.forEach(r => {
            const item = document.createElement("div");
            item.textContent = r.name;
            list.appendChild(item);
        });
        panel.classList.remove('translate-x-full');
    }

    // Modal functions
    function openPorch(title, message) {
        document.getElementById("porchTitle").innerText = title;
        document.getElementById("porchMessage").innerText = message;
        document.getElementById("porchPanel").classList.remove("hidden");
    }

    function closePorch() {
        document.getElementById("porchPanel").classList.add("hidden");
    }

    function openJoin() {
        openPorch(
            "Join the Movement",
            "Soon you'll be able to add yourself to the map and connect with others who walk the same path."
        );
    }

    // Event listeners
    document.getElementById('joinButton').addEventListener('click', openJoin);
    window.openPorch = openPorch;
    window.closePorch = closePorch;
</script></p>
      </div>

  </main>

  <!-- Sparks container -->
  <div class="sparks-container"></div>
  <!-- Overlay for ignition effect -->
  <div class="ignite-overlay"></div>
  
  

  <!-- Companion orb -->
  <div id="companion" class="companion-orb"></div>
  <script type="module" src="js/app.js"></script>

    <script type="module" src="js/SAVEorbitFloatingPlayer.js" defer></script>

    <script src="js/today.js" defer></script>

    <!-- Core Resource Scripts -->
    <script type="module" src="/js/core/resourceManager.js"></script>

    <script type="module" src="/js/core/misslerPlaylist.js"></script>

    <!-- Firebase Core -->
    <script type="module" src="./js/core/firebase-init.dev.js"></script>

    <script>
        console.log("Leaflet loaded:", typeof L);

    <!-- Feature Scripts -->

    <script type="module" src="./js/core/joinButton.dev.js"></script>

    <script type="module" src="./js/core/prayerTicker.dev.js"></script>

      </div>

  </main>

  <!-- Sparks container -->
  <div class="sparks-container"></div>
  <!-- Overlay for ignition effect -->
  <div class="ignite-overlay"></div>
  
  

</div>

</body>
